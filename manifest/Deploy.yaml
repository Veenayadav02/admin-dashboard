apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 3

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/veenayadav02/health-website:7
        ports:
        - containerPort: 80
