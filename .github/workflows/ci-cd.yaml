name: Build and Deploy to eks-cluster

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set lowercase owner
      run: |
        echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

    - name: Build Image
      run: |
        docker build -t ghcr.io/$OWNER_LC/admin-dashboard:${{ github.run_number }} .

    - name: Push Image
      run: |
        docker push ghcr.io/$OWNER_LC/admin-dashboard:${{ github.run_number }}

    - name: Update Deployment Manifest
      run: |
        sed -i "s|image: .*|image: ghcr.io/$OWNER_LC/admin-dashboard:${{ github.run_number }}|g" manifest/Deploy.yaml

    - name: Commit Updated Manifest
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"

        git add manifest/Deploy.yaml
        git commit -m "Update image tag to ${{ github.run_number }}" || echo "No changes"
        git push

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name dynatrace-eks-cluster \
          --region us-east-1

    - name: Deploy Updated Manifest
      run: |
        kubectl apply -f manifest/Deploy.yaml
        kubectl apply -f manifest/svc.yaml
        kubectl apply -f manifest/ing.yaml

    - name: Verify Rollout
      run: |
        kubectl rollout status deployment/frontend
